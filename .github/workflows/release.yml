name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Pack npm tarball
        id: pack
        run: |
          mkdir -p release
          tarball="$(npm pack --pack-destination release)"
          echo "tarball=release/${tarball}" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        run: |
          cd release
          sha256sum *.tgz > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.pack.outputs.tarball }}" \
            release/SHA256SUMS.txt \
            --generate-notes \
            --verify-tag
